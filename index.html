<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Styles/style.css">
    <title>Flex Practice</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="images/addidas.png" alt="Addidas">
            </div>

            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Project</a></li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Contact Me</a></li>
            </ul>

            <button>
                Download CV
            </button>
        </nav>
    </header>






    <!-- form is strating from here -->
    <!-- form is strating from here -->
    <!-- form is strating from here -->
    <!-- form is strating from here -->

    <main>
        <section class="form-manage">
            
            <form>
                <h1>
                Step to <span>Futuristic</span>  World!
                </h1>

                <label for="email">Enter your Email </label>
                <input type="email" name="email" id="email" placeholder="enter email" required>
                <label for="pass">Enter your Password </label>
                <input type="password" name="pass" id="pass" placeholder="Password Here" maxlength="8">

                <button>Log in</button>
            </form>
        </section>



        <section class="pricing-cat">
            <h1>Upgrade your plan</h1>

            <div class="all-Carts">
                <div class="cart">
                <div class="cartTitle">
                    <h2>Free</h2>
                </div>
                <div class="priceInfo" style="float: left; margin-top: 10px;">
                    <p>RS</p>
                    <p class="priceNumber">0 <span>/ Month</span></p>
                </div>
                <h4>
                    See what AI can do
                </h4>
                <button class="current-btn">Your Current Plan</button>
            </div>



            <div class="cart">
                <div class="cartTitle">
                    <h2>Go</h2>
                </div>
                <div class="priceInfo" style="float: left; margin-top: 10px;">
                    <p>RS</p>
                    <p class="priceNumber">35 <span>/ Month</span></p>
                </div>
                <h4>
                    Keep chatting with expanded access
                </h4>
                <button>Your Current Plan</button>
            </div>



            <div class="cart active">
                <div class="cartTitle ">
                    <h3>Plus</h3>
                    <p>Popular</p>
                </div>
                <div class="priceInfo" style="float: left; margin-top: 10px;">
                    <p>RS</p>
                    <p class="priceNumber">90 <span>/ Month</span></p>
                </div>
                <h4>
                    Unlock the full experience
                </h4>

                <button>Your Current Plan</button>
            </div>

        
        </section>
    </main>
</body>
</html>
